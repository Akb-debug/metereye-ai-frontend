<div class="topbar">

  <!-- Logo -->
  <div class="topbar-left">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <span class="brand-name">MeterEye <strong>AI</strong></span>
    </div>
  </div>

  <!-- Actions -->
  <div class="topbar-right">

    <!-- Cloche alertes -->
    <a routerLink="/alertes" class="topbar-icon-btn" title="Alertes">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      @if (nbAlertesNonLues() > 0) {
        <span class="alert-badge">{{ nbAlertesNonLues() }}</span>
      }
    </a>

    <!-- Avatar utilisateur + Dropdown -->
    <div class="topbar-user-wrap">
      <button class="topbar-user" (click)="toggleDropdown()" [class.open]="dropdownOpen()" type="button">
        <div class="user-avatar">{{ getInitiales() }}</div>
        <span class="user-name">{{ nomComplet() }}</span>
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
          class="chevron" [class.rotated]="dropdownOpen()">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      @if (dropdownOpen()) {
        <div class="user-dropdown">

          <div class="dropdown-header">
            <div class="dh-avatar">{{ getInitiales() }}</div>
            <div class="dh-info">
              <span class="dh-name">{{ nomComplet() }}</span>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <a routerLink="/alertes" class="dropdown-item" (click)="dropdownOpen.set(false)">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span>Notifications</span>
            @if (nbAlertesNonLues() > 0) {
              <span class="dropdown-badge">{{ nbAlertesNonLues() }}</span>
            }
          </a>

          <a routerLink="/profil" class="dropdown-item" (click)="dropdownOpen.set(false)">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span>Mon profil</span>
          </a>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item danger" (click)="logout()" type="button">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span>Déconnexion</span>
          </button>

        </div>
      }
    </div>

  </div>
</div>
