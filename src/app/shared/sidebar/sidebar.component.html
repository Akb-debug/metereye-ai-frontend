<!-- ✅ CRÉÉ — sidebar.component.html -->
<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">MeterEye AI</span>
      <span class="logo-tagline">Gestion compteurs</span>
    </div>
  </div>

  <!-- User info -->
  <div class="sidebar-user">
    <div class="user-avatar">
      {{ getInitiales() }}
    </div>
    <div class="user-info">
      <span class="user-name">{{ nomComplet() }}</span>
      <span class="user-role">{{ role() | lowercase }}</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <span class="nav-section-label">Navigation</span>
        @if(typeCompteur == "CLASSIQUE"){

          <a routerLink="/dashboard/classique" routerLinkActive="active"
       [routerLinkActiveOptions]="{exact: false}" class="nav-item nav-item-sub">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span>Dashboard</span>
    </a>

        }@else{

           <a routerLink="/dashboard/cashpower" routerLinkActive="active"
       [routerLinkActiveOptions]="{exact: false}" class="nav-item">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Dashboard</span>
    </a>

        }
   


    <a routerLink="/historique" routerLinkActive="active" class="nav-item">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>Historique</span>
    </a>

    <a routerLink="/alertes" routerLinkActive="active" class="nav-item">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span>Alertes</span>
      @if (nbAlertesNonLues() > 0) {
        <span class="nav-badge">{{ nbAlertesNonLues() > 99 ? '99+' : nbAlertesNonLues() }}</span>
      }
    </a>

    <span class="nav-section-label" style="margin-top:8px">Compte</span>

    <a routerLink="/profil" routerLinkActive="active" class="nav-item">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span>Mon profil</span>
    </a>
  </nav>

  <!-- Déconnexion -->
  <div class="sidebar-footer">
    <button class="nav-item nav-logout" (click)="logout()">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span>Déconnexion</span>
    </button>
  </div>

</aside>
